<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Superior Double Bathroom 360 View</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #05070c;
        font-family: "Poppins", Arial, sans-serif;
      }
      .viewer-wrap { position: relative; width: 100%; height: 100vh; }
      .embed-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; }
      .embed-container iframe, .embed-container object, .embed-container embed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
      .back-link {
        position: fixed;
        z-index: 5;
        top: 18px;
        left: 18px;
        text-decoration: none;
        color: #fff;
        background: rgba(15, 18, 28, 0.66);
        border: 1px solid rgba(255, 255, 255, 0.25);
        padding: 10px 14px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        backdrop-filter: blur(4px);
        transition: background-color 0.2s ease, border-color 0.2s ease;
      }
      .back-link:hover {
        background: rgba(177, 114, 86, 0.92);
        border-color: rgba(255, 255, 255, 0.5);
      }
    </style>
  <style>
  .vt-shell{position:relative;width:100%;height:100%;min-height:420px;border:0;background:linear-gradient(140deg,#1f1f1f,#3d3d3d);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .vt-shell::before{content:"360° Virtual Tour";position:absolute;top:14px;left:16px;color:#fff;font:600 14px/1.2 Arial,sans-serif;opacity:.88;letter-spacing:.04em}
  .vt-shell__btn{position:relative;z-index:2;border:1px solid rgba(255,255,255,.7);background:rgba(0,0,0,.35);color:#fff;padding:12px 20px;font:600 14px/1 Arial,sans-serif;letter-spacing:.05em;cursor:pointer}
  .vt-shell iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
</style>
</head>

    <a class="back-link" href="superior-double-360.html">Back to Superior Double 360</a>
    <div class="viewer-wrap">
      <div class='embed-container'>
        <div class="vt-shell" data-vt-src="https://momento360.com/e/u/ca92eed30b8b4194b2c844ebb76f8dab?utm_campaign=embed&utm_source=other&heading=0&pitch=0&field-of-view=75&size=medium&display-plan=true" data-vt-title="360 virtual tour"><button type="button" class="vt-shell__btn">View Tour</button></div>
      </div>
    </div>

<script src="js/jquery-3.3.1.min.js" defer></script>
<script src="js/main.js?v=20260416-2" defer></script>
<script>
(function () {
  function mountTour(shell) {
    if (!shell || shell.dataset.loaded === "1") return;
    var src = shell.getAttribute("data-vt-src");
    if (!src) return;
    var iframe = document.createElement("iframe");
    iframe.src = src;
    iframe.loading = "lazy";
    iframe.decoding = "async";
    iframe.allowFullscreen = true;
    iframe.title = shell.getAttribute("data-vt-title") || "360 virtual tour";
    shell.dataset.loaded = "1";
    shell.innerHTML = "";
    shell.appendChild(iframe);
  }

  var shells = document.querySelectorAll(".vt-shell[data-vt-src]");
  if (!shells.length) return;

  shells.forEach(function (shell) {
    var btn = shell.querySelector(".vt-shell__btn");
    if (btn) btn.addEventListener("click", function () { mountTour(shell); }, { passive: true });
  });

  if ("IntersectionObserver" in window) {
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          mountTour(entry.target);
          io.unobserve(entry.target);
        }
      });
    }, { rootMargin: "320px 0px" });
    shells.forEach(function (shell) { io.observe(shell); });
  }
})();
</script>
</body>
</html>
