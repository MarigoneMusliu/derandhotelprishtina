<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="room-details-title">Room Details</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: #2a2521;
        font-family: "Traviata", "Forum", serif;
      }
      .global-lang-floating {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 99999;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 999px;
        padding: 6px;
        display: inline-flex;
        gap: 6px;
      }
      .global-lang-floating .lang-btn {
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 999px;
        padding: 4px 10px;
        color: #fff;
        background: transparent;
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        font-family: "Traviata", "Forum", serif;
      }
      .global-lang-floating .lang-btn.lang-active {
        background: #b17256;
        border-color: #b17256;
      }
      .wrap {
        width: min(860px, 92%);
        text-align: center;
      }
      .wrap h1 {
        margin: 0 0 10px;
        font-size: clamp(30px, 5vw, 52px);
      }
      .wrap p {
        margin: 0;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div class="global-lang-floating header__lang__selector" aria-label="Language selector">
      <button class="lang-btn lang-active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="de">DE</button>
      <button class="lang-btn" data-lang="al">AL</button>
    </div>
    <main class="wrap">
      <h1 data-i18n="room-details-title">Room Details</h1>
      <p data-i18n="room-details-copy">
        Room details content is being prepared. Please return shortly.
      </p>
    </main>
    <script src="js/jquery-3.3.1.min.js" defer></script>
    <script src="js/main.js?v=20260416-2" defer></script>
  </body>
</html>
