<script src="js/jquery-3.3.1.min.js" defer></script>
<script src="js/main.js?v=20260416-2" defer></script>
<script>
(function () {
  function mountTour(shell) {
    if (!shell || shell.dataset.loaded === "1") return;
    var src = shell.getAttribute("data-vt-src");
    if (!src) return;
    var iframe = document.createElement("iframe");
    iframe.src = src;
    iframe.loading = "lazy";
    iframe.decoding = "async";
    iframe.allowFullscreen = true;
    iframe.title = shell.getAttribute("data-vt-title") || "360 virtual tour";
    shell.dataset.loaded = "1";
    shell.innerHTML = "";
    shell.appendChild(iframe);
  }

  var shells = document.querySelectorAll(".vt-shell[data-vt-src]");
  if (!shells.length) return;

  shells.forEach(function (shell) {
    var btn = shell.querySelector(".vt-shell__btn");
    if (btn) btn.addEventListener("click", function () { mountTour(shell); }, { passive: true });
  });

  if ("IntersectionObserver" in window) {
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          mountTour(entry.target);
          io.unobserve(entry.target);
        }
      });
    }, { rootMargin: "320px 0px" });
    shells.forEach(function (shell) { io.observe(shell); });
  }
})();
</script>
