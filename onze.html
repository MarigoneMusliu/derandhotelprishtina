<!-- <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="ONZE  — curated aesthetic and wellness treatments at Derand Hotel, Prishtina."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>ONZE</title>

    <link rel="stylesheet" href="css/bootstrap.min.css" type="text/css" />
    <link rel="stylesheet" href="css/font-awesome.min.css" type="text/css" />
    <link rel="stylesheet" href="css/elegant-icons.css" type="text/css" />
    <link rel="stylesheet" href="css/nice-select.css" type="text/css" />
    <link rel="stylesheet" href="css/jquery-ui.min.css" type="text/css" />
    <link rel="stylesheet" href="css/owl.carousel.min.css" type="text/css" />
    <link rel="stylesheet" href="css/slicknav.min.css" type="text/css" />
    <link rel="stylesheet" href="css/style.css" type="text/css" />

    <style>
      /* RINU page: typography inherits site Traviata (policy-font-traviata) */
      html {
        scroll-padding-top: 100px;
      }

      body.onze1-page {
        overflow-x: hidden;
      }

      .onze1-main {
        --onze1-cream: #f7f4ef;
        --onze1-white: #fdfcfa;
        --onze1-sand: #ebe4da;
        --onze1-line: rgba(28, 27, 26, 0.12);
        --onze1-taupe: #8f8378;
        --onze1-olive: #5e574e;
        --onze1-ink: #1c1b1a;
        --onze1-muted: #6a6560;
        --onze1-accent: #7a6f63;
        color: var(--onze1-ink);
        background: var(--onze1-white);
        overflow-x: hidden;
      }

      /* Keep one consistent page background except hero header */
      .onze1-main > div.onze1-strip {
        background: var(--onze1-cream);
      }

      .onze1-main * {
        box-sizing: border-box;
      }

      /* Force Traviata style across RINU text content */
      .onze1-main,
      .onze1-main h1,
      .onze1-main h2,
      .onze1-main h3,
      .onze1-main h4,
      .onze1-main p,
      .onze1-main a,
      .onze1-main button,
      .onze1-main li,
      .onze1-main summary,
      .onze1-main span,
      .onze1-main input,
      .onze1-main textarea {
        font-family: "Traviata", serif !important;
      }

      .onze1-main img {
        max-width: 100%;
        height: auto;
        vertical-align: middle;
      }

      /* Global slow-appear text reveal + gentle parallax drift */
      .onze1-scroll-reveal {
        opacity: 0;
        transform: translate3d(0, 34px, 0);
        transition:
          opacity 1.05s cubic-bezier(0.21, 0.61, 0.35, 1),
          transform 1.2s cubic-bezier(0.21, 0.61, 0.35, 1);
        will-change: opacity, transform;
      }

      .onze1-scroll-reveal.is-visible {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }

      @media (prefers-reduced-motion: reduce) {
        .onze1-scroll-reveal {
          opacity: 1;
          transform: none !important;
          transition: none;
        }
      }

      .onze1-inner {
        width: 100%;
        max-width: 1360px;
        margin: 0 auto;
        padding-left: clamp(16px, 2.2vw, 32px);
        padding-right: clamp(16px, 2.2vw, 32px);
      }

      .onze1-eyebrow {
        font-size: 0.72rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        font-weight: 500;
        color: var(--onze1-taupe);
        margin-bottom: 1rem;
      }

      .onze1-h2 {
        font-size: clamp(2rem, 4.2vw, 3.25rem);
        font-weight: 500;
        line-height: 1.12;
        letter-spacing: -0.02em;
        margin: 0 0 1.25rem;
        color: var(--onze1-ink);
      }

      .onze1-lead {
        font-size: clamp(1rem, 1.35vw, 1.125rem);
        font-weight: 300;
        line-height: 1.75;
        color: var(--onze1-muted);
        max-width: 38rem;
        margin: 0;
      }

      .onze1-divider {
        display: flex;
        align-items: center;
        gap: 1.25rem;
        margin: 0 auto 2.5rem;
        max-width: 520px;
      }

      .onze1-divider::before,
      .onze1-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--onze1-line);
      }

      .onze1-divider span {
        font-size: 0.85rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--onze1-taupe);
        white-space: nowrap;
      }

      .onze1-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.95rem 1.85rem;
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        text-decoration: none !important;
        border: 1px solid transparent;
        transition:
          background 0.25s ease,
          color 0.25s ease,
          border-color 0.25s;
        cursor: pointer;
      }

      .onze1-btn--solid {
        background: var(--onze1-olive);
        color: #fff !important;
        border-color: var(--onze1-olive);
      }

      .onze1-btn--solid:hover {
        background: var(--onze1-ink);
        border-color: var(--onze1-ink);
        color: #fff !important;
      }

      .onze1-btn--ghost {
        background: transparent;
        color: var(--onze1-ink) !important;
        border-color: var(--onze1-line);
      }

      .onze1-btn--ghost:hover {
        border-color: var(--onze1-ink);
        color: var(--onze1-ink) !important;
      }

      .onze1-btn--light {
        background: rgba(255, 255, 255, 0.92);
        color: var(--onze1-ink) !important;
        border-color: transparent;
      }

      .onze1-btn--light:hover {
        background: #fff;
        color: var(--onze1-ink) !important;
      }

      /* Hero */
      .onze1-hero {
        position: relative;
        min-height: min(88vh, 920px);
        display: flex;
        align-items: flex-end;
        padding: clamp(100px, 14vh, 160px) 0 clamp(48px, 8vh, 88px);
        background: #2a2622 url("img/onzeheader.webp") center / cover no-repeat;
        color: #fff;
      }

      .onze1-hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          105deg,
          rgba(18, 16, 14, 0.97) 0%,
          rgba(18, 16, 14, 0.78) 48%,
          rgba(18, 16, 14, 0.7) 100%
        );
        pointer-events: none;
      }

      .onze1-hero__content {
        position: relative;
        z-index: 1;
        max-width: 640px;
        animation: onze1FadeInLeft 3.2s cubic-bezier(0.22, 1, 0.36, 1) 0.25s
          both;
        will-change: transform, opacity;
      }

      .onze1-hero__title {
        font-size: clamp(2.35rem, 5.5vw, 4rem);
        font-family: "Traviata", serif;
        font-weight: 400;
        line-height: 1.04;
        letter-spacing: 0.01em;
        margin: 0 0 1.25rem;
        color: #fff !important;
        text-wrap: balance;
        text-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
      }

      .onze1-hero__title-sub {
        display: block;
        margin-top: 0.6rem;
        font-size: clamp(1rem, 2vw, 1.45rem);
        line-height: 1.35;
        letter-spacing: 0.04em;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.96);
      }

      @keyframes onze1FadeInLeft {
        0% {
          opacity: 0;
          transform: translate3d(-46px, 0, 0);
        }
        100% {
          opacity: 1;
          transform: translate3d(0, 0, 0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .onze1-hero__content {
          animation: none;
        }
      }

      .onze1-hero__sub {
        font-size: clamp(1rem, 1.4vw, 1.2rem);
        font-weight: 300;
        line-height: 1.65;
        opacity: 0.92;
        margin: 0 0 2rem;
        max-width: 32rem;
        color: rgba(255, 255, 255, 0.95) !important;
      }

      .onze1-hero__actions {
        margin-top: 0.4rem;
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
        padding: 0.38rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.13);
        border: 1px solid rgba(255, 255, 255, 0.28);
        backdrop-filter: blur(2px);
      }

      @media (min-width: 768px) {
        .onze1-hero__actions {
          display: flex;
          width: min(100%, 620px);
          justify-content: space-between;
          gap: 1.25rem;
          padding: 0;
          border: 0;
          border-radius: 0;
          background: transparent;
          backdrop-filter: none;
        }

        .onze1-hero__divider {
          display: none;
        }

        .onze1-hero__link {
          flex: 0 0 auto;
          justify-content: center;
          min-height: 48px;
          padding: 0.72rem 1.1rem;
          border-radius: 999px;
          background: rgba(255, 255, 255, 0.13);
          border: 1px solid rgba(255, 255, 255, 0.28);
        }

        .onze1-hero__link:last-child {
          margin-left: 170px;
        }
      }

      .onze1-hero__divider {
        width: 1px;
        height: 1.7rem;
        background: rgba(255, 255, 255, 0.34);
      }

      .onze1-hero__link {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        position: relative;
        z-index: 2;
        pointer-events: auto;
        touch-action: manipulation;
        font-family: "Traviata", serif;
        font-size: clamp(0.9rem, 1.4vw, 1.04rem);
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.95) !important;
        text-decoration: none !important;
        white-space: nowrap;
        padding: 0.45rem 0.95rem;
        border-radius: 999px;
        transition:
          background 0.3s ease,
          color 0.3s ease,
          transform 0.3s ease;
      }

      .onze1-hero__link::after {
        content: "→";
        font-size: 0.92em;
        opacity: 0.78;
      }

      .onze1-hero__link:hover {
        color: #fff !important;
        background: rgba(255, 255, 255, 0.18);
        transform: translateY(-1px);
      }

      .onze1-hero__note {
        margin-top: 1.5rem;
        font-size: 0.7rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0.65;
        color: #fff !important;
      }

      /* Circular showcase below hero */
      .onze1-orbit {
        background: var(--onze1-cream);
        padding: clamp(42px, 6vw, 72px) 0;
        overflow: hidden;
      }

      .onze1-orbit .onze1-inner {
        max-width: 100%;
        padding-left: 15px;
        padding-right: 15px;
      }

      .onze1-orbit__head {
        text-align: center;
        margin-bottom: 1.2rem;
      }

      .onze1-orbit__kicker {
        display: block;
        font-size: 0.64rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(28, 27, 26, 0.56);
        margin-bottom: 0.5rem;
      }

      .onze1-orbit__title {
        margin: 0;
        font-family: "Traviata", serif;
        font-size: clamp(1.15rem, 2.2vw, 1.45rem);
        color: rgba(28, 27, 26, 0.92);
      }

      .onze1-orbit__track-wrap {
        position: relative;
        width: 100%;
        margin: 0 auto;
      }

      .onze1-orbit__track {
        position: relative;
        height: clamp(190px, 26vw, 250px);
      }

      .onze1-orbit__item {
        position: absolute;
        top: 50%;
        left: 50%;
        width: clamp(86px, 10.2vw, 118px);
        aspect-ratio: 1 / 1;
        border-radius: 50%;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.26);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
        transform: translate(-50%, -50%);
        transition:
          transform 0.48s cubic-bezier(0.22, 1, 0.36, 1),
          filter 0.42s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.42s cubic-bezier(0.22, 1, 0.36, 1),
          width 0.42s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .onze1-orbit__item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .onze1-orbit__item--center {
        width: clamp(192px, 21.5vw, 258px);
        border-color: rgba(255, 255, 255, 0.6);
        filter: blur(0);
        opacity: 1;
        z-index: 4;
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.4);
      }

      .onze1-orbit__item--near {
        filter: blur(1.4px);
        opacity: 0.8;
        z-index: 3;
        transform: translate(-50%, -50%) scale(0.92);
      }

      .onze1-orbit__item--far {
        filter: blur(2.4px);
        opacity: 0.42;
        z-index: 2;
        transform: translate(-50%, -50%) scale(0.84);
      }

      .onze1-orbit__item--hidden {
        opacity: 0;
        pointer-events: none;
        z-index: 1;
      }

      .onze1-orbit__controls {
        position: absolute;
        inset: 50% 0 auto 0;
        transform: translateY(-50%);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0;
        padding: 0 clamp(6px, 2vw, 18px);
        pointer-events: none;
        z-index: 8;
      }

      .onze1-orbit__btn {
        width: 46px;
        height: 46px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.44);
        background: linear-gradient(
          145deg,
          rgba(18, 17, 16, 0.58),
          rgba(18, 17, 16, 0.36)
        );
        color: rgba(255, 255, 255, 0.95);
        font-size: 0.95rem;
        font-weight: 400;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        pointer-events: auto;
        backdrop-filter: blur(6px);
        box-shadow:
          0 12px 24px rgba(0, 0, 0, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.26);
        transition:
          background 0.35s ease,
          border-color 0.35s ease,
          transform 0.35s ease,
          box-shadow 0.35s ease,
          color 0.35s ease;
      }

      .onze1-orbit__btn:hover {
        background: linear-gradient(
          145deg,
          rgba(18, 17, 16, 0.74),
          rgba(18, 17, 16, 0.48)
        );
        border-color: rgba(255, 255, 255, 0.68);
        color: #fff;
        transform: translateY(-2px) scale(1.04);
        box-shadow:
          0 16px 30px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.32);
      }

      .onze1-orbit__btn:active {
        transform: translateY(0) scale(0.98);
      }

      .onze1-orbit__btn:focus-visible {
        outline: none;
        border-color: rgba(255, 255, 255, 0.82);
        box-shadow:
          0 0 0 3px rgba(255, 255, 255, 0.2),
          0 14px 26px rgba(0, 0, 0, 0.32);
      }

      .onze1-orbit__btn svg {
        width: 14px;
        height: 14px;
        display: block;
      }

      .onze1-orbit__btn svg path {
        stroke: currentColor;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      /* Trust strip */
      .onze1-strip {
        background: var(--onze1-cream);
        margin-top: 0;
        padding-top: clamp(16px, 2.6vw, 32px);
      }

      .onze1-strip__inner {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: clamp(10px, 2.2vw, 20px);
        padding: 1.1rem clamp(20px, 4vw, 48px);
        font-size: 0.68rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--onze1-muted);
        max-width: 900px;
        margin: 0 auto;
        text-align: center;
      }

      .onze1-strip__inner span {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .onze1-strip__inner .fa {
        font-size: 0.55rem;
        opacity: 0.55;
      }

      /* Philosophy */
      .onze1-philosophy {
        padding: clamp(58px, 9vw, 90px) 0;
        background: var(--onze1-cream);
      }

      .onze1-philosophy__grid {
        display: grid;
        grid-template-columns: minmax(280px, 420px) minmax(0, 1fr);
        gap: clamp(24px, 4.2vw, 56px);
        align-items: center;
        min-width: 0;
        max-width: 980px;
        margin: 0 auto;
      }

      .onze1-philosophy__copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
        max-width: 500px;
      }

      @media (max-width: 991px) {
        .onze1-philosophy__grid {
          grid-template-columns: 1fr;
          gap: clamp(16px, 3vw, 28px);
        }
      }

      .onze1-philosophy__visual {
        position: relative;
        min-height: 0;
      }

      .onze1-philosophy__visual img {
        width: 100%;
        aspect-ratio: 4 / 3;
        height: auto;
        object-fit: cover;
        object-position: center;
        filter: contrast(1.01) saturate(0.94);
        border: 1px solid rgba(28, 27, 26, 0.08);
      }

      .onze1-philosophy__frame {
        display: none;
      }

      @media (max-width: 991px) {
        .onze1-philosophy__frame {
          display: none;
        }
      }

      /* Services */
      .onze1-services {
        padding: clamp(72px, 11vw, 112px) 0 clamp(42px, 7vw, 68px);
        background: var(--onze1-cream);
      }

      .onze1-services__head {
        text-align: center;
        margin-bottom: clamp(40px, 6vw, 64px);
      }

      #onze1-services-title {
        text-transform: uppercase;
      }

      .onze1-services__grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: clamp(28px, 4vw, 48px);
      }

      @media (max-width: 767px) {
        .onze1-services__grid {
          grid-template-columns: 1fr;
          max-width: 420px;
          margin: 0 auto;
        }
      }

      .onze1-svc {
        text-align: center;
        padding: 2rem 1.25rem 0;
        border-top: 1px solid var(--onze1-line);
      }

      .onze1-svc__icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--onze1-line);
        border-radius: 50%;
        color: var(--onze1-taupe);
        font-size: 1.1rem;
      }

      .onze1-svc h3 {
        font-size: 1.45rem;
        font-weight: 500;
        margin: 0 0 0.75rem;
        color: var(--onze1-ink);
      }

      .onze1-svc p {
        font-size: 0.95rem;
        font-weight: 300;
        line-height: 1.7;
        color: var(--onze1-muted);
        margin: 0;
      }

      /* Spotlight */
      .onze1-spotlight {
        padding: clamp(18px, 3vw, 34px) 0 clamp(72px, 11vw, 112px);
        background: var(--onze1-cream);
      }

      @media (min-width: 992px) {
        .onze1-spotlight .onze1-inner {
          max-width: 100%;
          padding-left: 20px;
          padding-right: 20px;
        }
      }

      .onze1-spotlight__intro {
        text-align: center;
        max-width: 900px;
        margin: 0 auto clamp(30px, 5vw, 48px);
      }

      .onze1-spotlight__grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: clamp(14px, 2.2vw, 24px);
      }

      @media (max-width: 991px) {
        .onze1-spotlight__grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 575px) {
        .onze1-spotlight__grid {
          grid-template-columns: 1fr;
          gap: 14px;
        }
      }

      .onze1-treatment {
        border: 1px solid var(--onze1-line);
        background: var(--onze1-cream);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .onze1-treatment__media {
        aspect-ratio: 4 / 3;
        overflow: hidden;
      }

      .onze1-treatment__media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .onze1-treatment__body {
        padding: clamp(16px, 2.3vw, 22px);
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
      }

      .onze1-treatment__note {
        margin: 0;
        font-size: 0.84rem;
        line-height: 1.55;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--onze1-muted);
      }

      .onze1-treatment__title {
        font-size: clamp(1.06rem, 1.8vw, 1.28rem);
        font-weight: 500;
        margin: 0;
        color: var(--onze1-ink);
      }

      .onze1-treatment__copy {
        margin: 0;
        font-size: 0.9rem;
        line-height: 1.65;
        font-weight: 300;
        color: var(--onze1-muted);
      }

      .onze1-treatment__meta {
        margin-top: auto;
        padding-top: 0.55rem;
        font-size: 0.66rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--onze1-taupe);
      }

      .onze1-treatment__link {
        margin-top: auto;
        padding-top: 0.55rem;
        display: inline-block;
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--onze1-ink);
        text-decoration: none;
        border-bottom: 1px solid rgba(28, 27, 26, 0.3);
        padding-bottom: 0.08rem;
      }

      .onze1-treatment__toggle {
        margin-top: auto;
        padding-top: 0.55rem;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        border: 0;
        background: transparent;
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--onze1-ink);
        padding-left: 0;
        cursor: pointer;
      }

      .onze1-treatment__toggle::after {
        content: "→";
        font-size: 0.9em;
      }

      .onze1-treatment__toggle.is-active {
        color: var(--onze1-accent);
      }

      .onze1-spotlight__panel {
        margin-top: clamp(16px, 2.8vw, 28px);
        border: 1px solid rgba(177, 114, 86, 0.18);
        background: #fbf8f4;
        border-radius: 14px;
        padding: clamp(18px, 2.6vw, 30px);
        display: none;
      }

      .onze1-spotlight__panel.is-open {
        display: block;
      }

      .onze1-spotlight__content {
        display: none;
      }

      .onze1-spotlight__content.is-active {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.9rem clamp(16px, 2.4vw, 26px);
        align-items: start;
      }

      .onze1-spotlight__content h4 {
        margin: 0;
        font-size: 1.05rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--onze1-ink);
      }

      .onze1-spotlight__content.is-active h4 {
        grid-column: 1 / -1;
        margin-bottom: 0.35rem;
      }

      .onze1-spotlight__content p {
        margin: 0;
        font-size: 0.88rem;
        line-height: 1.62;
        color: var(--onze1-muted);
        background: #fff;
        border: 1px solid rgba(177, 114, 86, 0.16);
        border-left: 3px solid #b17256;
        border-radius: 10px;
        padding: 0.78rem 0.86rem;
      }

      .onze1-spotlight__content strong,
      .onze1-treatment__mobile-content strong {
        display: block;
        margin-bottom: 0.18rem;
        font-size: 0.9rem;
        font-weight: 700 !important;
        color: var(--onze1-ink);
      }

      .onze1-spotlight__content.is-active p {
        margin: 0;
      }

      .onze1-spotlight__content p:last-child {
        margin-bottom: 0;
      }

      .onze1-treatment__mobile-content {
        display: none;
        margin-top: 0.8rem;
        padding-top: 0.7rem;
        border-top: 1px solid rgba(28, 27, 26, 0.12);

      .onze1-treatment__mobile-content.is-open {
        display: block;
      }

      .onze1-treatment__mobile-content h4 {
        margin: 0 0 0.55rem;
        font-size: 0.98rem;
        color: var(--onze1-ink);
      }

      .onze1-treatment__mobile-content p {
        margin: 0 0 0.5rem;
        font-size: 0.84rem;
        line-height: 1.58;
        color: var(--onze1-muted);
        background: #fff;
        border: 1px solid rgba(177, 114, 86, 0.14);
        border-left: 3px solid #b17256;
        border-radius: 8px;
        padding: 0.68rem 0.72rem;
      }

      .onze1-treatment__mobile-content p:last-child {
        margin-bottom: 0;
      }

      .onze1-emfusion-banner {
        padding: clamp(36px, 6vw, 76px) 0 clamp(24px, 4vw, 56px);
        margin-top: 0;
        background: var(--onze1-cream);
        margin-bottom: 0;
      }

      .onze1-emfusion-banner img {
        width: 100%;
        height: auto;
        display: block;
      }

      /* Treatments accordion */
      .onze1-treatments {
        padding: clamp(72px, 11vw, 112px) 0 clamp(30px, 5vw, 52px);
        background: #e5ddd2;
      }

      .onze1-treatments .onze1-inner {
        max-width: 100%;
        padding-left: 210px;
        padding-right: 210px;
      }

      @media (max-width: 1199px) {
        .onze1-treatments .onze1-inner {
          padding-left: 110px;
          padding-right: 110px;
        }
      }

      @media (max-width: 991px) {
        .onze1-treatments .onze1-inner {
          padding-left: 48px;
          padding-right: 48px;
        }
      }

      @media (max-width: 575px) {
        .onze1-treatments .onze1-inner {
          padding-left: 18px;
          padding-right: 18px;
        }
      }

      .onze1-treatments__head {
        text-align: center;
        margin-bottom: clamp(40px, 6vw, 64px);
      }

      .onze1-treatments .onze1-divider span {
        color: #111 !important;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.16em;
      }

      .onze1-acc {
        max-width: 100%;
        margin: 0 auto;
        border-top: 1px solid rgba(28, 27, 26, 0.15);
      }

      .onze1-acc details {
        border-bottom: 1px solid rgba(28, 27, 26, 0.15);
      }

      .onze1-acc summary {
        list-style: none;
        cursor: pointer;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem 0;
        font-size: clamp(0.92rem, 2.2vw, 1.24rem);
        font-weight: 500;
        color: var(--onze1-ink);
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .onze1-acc summary::-webkit-details-marker {
        display: none;
      }

      .onze1-acc summary::after {
        content: "+";
        font-size: 1rem;
        font-weight: 400;
        color: var(--onze1-taupe);
        flex-shrink: 0;
        width: 1.25rem;
        text-align: center;
        line-height: 1;
      }

      .onze1-acc details[open] summary::after {
        content: "−";
      }

      .onze1-acc__body {
        padding: 0 0 1rem;
        max-width: 62rem;
        font-size: 0.86rem;
        line-height: 1.62;
        font-weight: 300;
        color: var(--onze1-muted);
      }

      .onze1-qa-services {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.55rem 1.1rem;
      }

      .onze1-qa-services li {
        position: relative;
        padding-left: 1rem;
        line-height: 1.55;
      }

      .onze1-qa-services li::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0.7em;
        width: 0.35rem;
        height: 0.35rem;
        border-radius: 50%;
        background: rgba(122, 111, 99, 0.8);
      }

      /* Post Q&A image trio */
      .onze1-trio {
        padding: clamp(34px, 6vw, 64px) 0;
        background: var(--onze1-cream);
      }

      .onze1-trio .onze1-inner {
        max-width: 100%;
        padding-left: 20px;
        padding-right: 20px;
      }

      .onze1-trio__grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: clamp(12px, 2vw, 20px);
      }

      .onze1-trio__card {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
        background: #d9cec1;
        aspect-ratio: 4 / 3;
      }

      .onze1-trio__card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.55s ease;
      }

      .onze1-trio__card::after {
        content: "";
        position: absolute;
        inset: auto 0 0 0;
        height: 35%;
        background: linear-gradient(
          to top,
          rgba(17, 14, 12, 0.48),
          rgba(17, 14, 12, 0)
        );
        pointer-events: none;
      }

      .onze1-trio__label {
        position: absolute;
        left: 12px;
        bottom: 10px;
        z-index: 1;
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #fff;

      @media (prefers-reduced-motion: no-preference) {
        .onze1-trio__card:hover img {
          transform: scale(1.04);
        }
      }

        .onze1-trio .onze1-inner {
          padding-left: 16px;
          padding-right: 16px;

          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 12px;
        }

        .onze1-trio__card:first-child {
          grid-column: 1 / -1;
          aspect-ratio: 16 / 9;
        }
      }

      @media (max-width: 575px) {
        .onze1-trio .onze1-inner {
          padding-left: 14px;
          padding-right: 14px;
        }

        .onze1-trio__grid {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .onze1-trio__card {
          aspect-ratio: 16 / 10;
          border-radius: 10px;
        }

        .onze1-trio__card::after {
          height: 26%;
        }
      }

      /* Gallery */
      .onze1-gallery {
        padding: clamp(42px, 7vw, 68px) 0 clamp(72px, 11vw, 112px);
        background: var(--onze1-cream);
      }

      .onze1-gallery .onze1-inner {

        padding-left: 0;
        padding-right: 0;
      }

      .onze1-gallery__head {
        text-align: center;
        margin-bottom: 3rem;

      .onze1-gallery__grid {
        display: grid;
        grid-template-columns: minmax(170px, 1fr) minmax(380px, 2.3fr) minmax(
            170px,
            1fr
          );
        grid-template-rows: repeat(2, minmax(220px, 1fr));
        gap: 14px;
        width: 100%;
        min-width: 0;
      }

      .onze1-gallery__cell {
        position: relative;
        overflow: hidden;
        background: var(--onze1-sand);
        min-height: 140px;
      }

      .onze1-gallery__cell img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.6s ease;
      }

      @media (prefers-reduced-motion: no-preference) {
        .onze1-gallery__cell:hover img {
          transform: scale(1.04);
        }
      }

      .onze1-gallery__cell--a {
        grid-column: 2;
        grid-row: 1 / span 2;
        min-height: 454px;
      }

      .onze1-gallery__cell--b {
        grid-column: 1;
        grid-row: 1;
      }

      .onze1-gallery__cell--c {
        grid-column: 1;
        grid-row: 2;
      }

      .onze1-gallery__cell--d {
        grid-column: 3;
        grid-row: 1;
      }

      .onze1-gallery__cell--e {
        grid-column: 3;
        grid-row: 2;
      }

      @media (max-width: 767px) {
        .onze1-gallery__grid {
          grid-template-columns: 1fr 1fr;
          grid-template-rows: auto;
          gap: 10px;
        }

        .onze1-gallery__cell--a,
        .onze1-gallery__cell--b,
        .onze1-gallery__cell--c,
        .onze1-gallery__cell--d,
        .onze1-gallery__cell--e {
          grid-column: span 1;
          grid-row: auto;
          min-height: 160px;
        }

        .onze1-gallery__cell--a {
          grid-column: 1 / -1;
          min-height: 260px;
        }
      }

      .onze1-gallery__caption {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 1rem 1.1rem;
        font-size: 1rem;
        font-weight: 500;
        color: #fff;
        background: linear-gradient(transparent, rgba(18, 16, 14, 0.75));
      }

      /* Process */
      .onze1-process {
        padding: 0 0 clamp(72px, 11vw, 112px);
        background: var(--onze1-cream);
      }

      .onze1-process__sub {
        display: flex;
        justify-content: center;
        text-align: center;
        font-size: 0.8rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--onze1-taupe);
        margin: 0 auto 1.25rem;
      }

      .onze1-process__head {
        text-align: center;
        margin-bottom: 3.5rem;
      }

      .onze1-process__steps {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: clamp(24px, 3vw, 40px);
        margin-top: clamp(56px, 8vw, 92px);
      }

      .onze1-step__num {
        font-size: clamp(2.5rem, 4vw, 3.25rem);
        font-weight: 600;
        color: var(--onze1-taupe);
        opacity: 0.45;
        line-height: 1;
        margin-bottom: 0.75rem;
      }

      .onze1-step h3 {
        font-size: 1.1rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin: 0 0 0.65rem;
        color: var(--onze1-ink);
      }

      .onze1-step p {
        font-size: 0.92rem;
        font-weight: 300;
        line-height: 1.7;
        color: var(--onze1-muted);
        margin: 0;

      /* Testimonial */
      .onze1-quoteblock {
        padding: clamp(72px, 10vw, 100px) 0;
        background: var(--onze1-cream);
        text-align: center;
      }

      .onze1-quote {
        font-size: clamp(1.65rem, 3.2vw, 2.35rem);
        font-style: italic;
        font-weight: 400;
        line-height: 1.45;
        max-width: 860px;
        margin: 0 auto 1.5rem;
        color: #b17256;

      .onze1-quote::before {
        content: "“";
        display: block;
        font-size: 2.5rem;
        line-height: 1;
        color: #b17256;
        opacity: 0.45;
        margin-bottom: 0.5rem;

      .onze1-quoteby {
        font-size: 0.85rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #b17256;

      .onze1-visit {

      .onze1-visit__label {

      .onze1-visit .onze1-btn--light:hover,

        background: #9a6248 !important;

        color: #fff !important;

      /* Showcase: editorial image grid */
      .onze1-showcase {

        display: block;

        font-size: 0.68rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--onze1-taupe);

      @media (max-width: 575px) {

          font-size: clamp(2rem, 4.2vw, 3.25rem);

        .onze1-hero__title {

        .onze1-hero__link {
          justify-content: center;
          font-size: 0.92rem;
        }

        .onze1-hero__note {
          font-size: 0.58rem;
          letter-spacing: 0.08em;
          line-height: 1.55;

        .onze1-strip__inner {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 0.55rem 0.75rem;

        .onze1-h2 {

    <script>
      (function () {
        var panel = document.getElementById("onze1-spotlight-panel");
        if (!panel) return;

        var toggles = Array.prototype.slice.call(
          document.querySelectorAll(".onze1-treatment__toggle"),
        );
        var blocks = Array.prototype.slice.call(
          panel.querySelectorAll("[data-treatment-content]"),
        );
        var mobileBlocks = Array.prototype.slice.call(
          document.querySelectorAll(".onze1-treatment__mobile-content"),
        );
        var lastToggleAt = 0;

        function showContent(key) {
          var isActive = false;
          blocks.forEach(function (block) {
            var match = block.getAttribute("data-treatment-content") === key;
            block.classList.toggle("is-active", match);
            if (match) isActive = true;
          });

          panel.classList.toggle("is-open", isActive);
          toggles.forEach(function (btn) {
            btn.classList.toggle(
              "is-active",
              btn.getAttribute("data-treatment") === key && isActive,
            );
          });

          if (isActive) {
            mobileBlocks.forEach(function (block) {
              block.classList.remove("is-open");
            });
          }
        }

        function showMobileContent(key) {
          var isActive = false;
          mobileBlocks.forEach(function (block) {
            var match =
              block.getAttribute("data-mobile-treatment-content") === key;
            block.classList.toggle("is-open", match);
            if (match) isActive = true;
          });

          if (isActive) {
            blocks.forEach(function (block) {
              block.classList.remove("is-active");
            });
            panel.classList.remove("is-open");
          }

          toggles.forEach(function (btn) {
            btn.classList.toggle(
              "is-active",
              btn.getAttribute("data-treatment") === key && isActive,
            );
          });
        }

        toggles.forEach(function (btn) {
          btn.addEventListener("click", function (event) {
            event.preventDefault();

            var now = Date.now();
            if (now - lastToggleAt < 220) return;
            lastToggleAt = now;

            var key = btn.getAttribute("data-treatment");
            var isResponsive = window.matchMedia("(max-width: 575px)").matches;

            if (isResponsive) {
              var alreadyOpenMobile = btn.classList.contains("is-active");
              if (alreadyOpenMobile) {
                showMobileContent("");
                return;
              }
              showMobileContent(key);
              return;
            }

            var alreadyOpenDesktop =
              panel.classList.contains("is-open") &&
              btn.classList.contains("is-active");
            if (alreadyOpenDesktop) {
              showContent("");
              return;
            }
            showContent(key);
          });
        });
      })();
    </script>
    <script>
      (function () {
        var track = document.getElementById("onze1-orbit-track");
        if (!track) return;

        var items = Array.prototype.slice.call(
          track.querySelectorAll(".onze1-orbit__item"),
        );
        var prevBtn = document.getElementById("onze1-orbit-prev");
        var nextBtn = document.getElementById("onze1-orbit-next");
        var activeIndex = 0;
        var isAnimating = false;

        function circularDistance(a, b, len) {
          var diff = (a - b + len) % len;
          if (diff > len / 2) diff -= len;
          return diff;
        }

        function render() {
